name: Bygg og deploy til demo.frimedia.no

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_PUBLIC_SITE_URL: https://demo.frimedia.no
  NEXT_PUBLIC_SUPABASE_URL: https://ppugutfpfygpimoniqxd.supabase.co
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_suH0x0Nx6mWnDIfIDN85nA_thrWbY-w

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Sett sammen kjøreklar app (standalone + static + public)
        run: |
          mkdir -p deploy-out
          cp -r .next/standalone/. deploy-out/
          mkdir -p deploy-out/.next/static
          cp -r .next/static/. deploy-out/.next/static/
          cp -r public deploy-out/public
          cp .deploy/htaccess deploy-out/.htaccess

      - name: Push ferdig bygg til deploy-grenen
        run: |
          cd deploy-out
          git init -b deploy
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Bygg fra ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy til ProISP via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            export DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/home/frimeuhl/demo.frimedia.no' }}"
            export DEPLOY_USER="${{ secrets.DEPLOY_USER || 'frimeuhl' }}"
            cd "$DEPLOY_PATH"
            git fetch origin deploy
            git checkout -f -B deploy origin/deploy
            mkdir -p tmp && touch tmp/restart.txt
            cloudlinux-selector restart --json --interpreter nodejs --user "$DEPLOY_USER" --app-root demo.frimedia.no || true
            echo "Live: $(git rev-parse --short HEAD)"
