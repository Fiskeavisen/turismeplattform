name: Bygg og deploy til frimedia.no

on:
  workflow_dispatch:

env:
  NEXT_PUBLIC_SITE_URL: https://frimedia.no
  NEXT_PUBLIC_SUPABASE_URL: https://ppugutfpfygpimoniqxd.supabase.co
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_suH0x0Nx6mWnDIfIDN85nA_thrWbY-w

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Sett sammen kjøreklar app (standalone + static + public)
        run: |
          mkdir -p deploy-out
          cp -r .next/standalone/. deploy-out/
          mkdir -p deploy-out/.next/static
          cp -r .next/static/. deploy-out/.next/static/
          cp -r public deploy-out/public
          cp .deploy/htaccess deploy-out/.htaccess
          tar czf release.tar.gz -C deploy-out .

      - name: Push ferdig bygg til deploy-grenen
        run: |
          cd deploy-out
          git init -b deploy
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Bygg fra ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" deploy

      - name: Lagre byggpakke for SFTP-deploy
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: release.tar.gz
          retention-days: 3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Last ned byggpakke
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle

      - name: Last opp til ProISP via SFTP/SCP (port 22)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "release.tar.gz"
          target: "${{ secrets.DEPLOY_PATH }}/tmp"

      - name: Pakk ut, restart og verifiser live
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          command_timeout: 6m
          script: |
            set -e

            APP="${{ secrets.DEPLOY_PATH }}"
            APPROOT="demo.frimedia.no"
            DOCROOT="$HOME/public_html"
            NODEJS="$HOME/nodevenv/demo.frimedia.no/20/bin/node"
            BUNDLE="$APP/tmp/release.tar.gz"

            write_passenger_htaccess() {
              local target="$1"
              cat > "$target" <<EOF
            # DO NOT REMOVE. CLOUDLINUX PASSENGER CONFIGURATION BEGIN
            PassengerAppRoot "$APP"
            PassengerBaseURI "/"
            PassengerNodejs "$NODEJS"
            PassengerAppType node
            PassengerStartupFile server.js
            # DO NOT REMOVE. CLOUDLINUX PASSENGER CONFIGURATION END
            EOF
            }

            restart_app() {
              mkdir -p "$APP/tmp" && touch "$APP/tmp/restart.txt"
              cloudlinux-selector restart --json --interpreter nodejs --user frimeuhl --app-root "$APPROOT" || true
            }

            check_url() {
              local url="$1"
              local label="$2"
              local home_code chunk chunk_code
              home_code=$(curl -s -o /dev/null -w "%{http_code}" -L "$url/")
              chunk=$(curl -s -L "$url/" | grep -o '/_next/static/chunks/[^"]*\.js' | head -1 || true)
              chunk_code=$(curl -s -o /dev/null -w "%{http_code}" -L "$url$chunk")
              echo "$label: forside=$home_code chunk=$chunk_code ($chunk)"
              [ "$home_code" = "200" ] && [ "$chunk_code" = "200" ]
            }

            TS=$(date +%Y%m%d-%H%M%S)
            mkdir -p "$APP" "$APP/tmp" "$HOME/backups"
            echo "==> Backup av nåværende live-app"
            tar czf "$HOME/backups/live-$TS.tar.gz" -C "$APP" . 2>/dev/null || true
            ls -1t "$HOME"/backups/live-*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm -f

            echo "==> Ren utskifting av live-app"
            find "$APP" -mindepth 1 -maxdepth 1 ! -name tmp ! -name .env.local -exec rm -rf {} +
            tar xzf "$BUNDLE" -C "$APP"
            write_passenger_htaccess "$APP/.htaccess"
            write_passenger_htaccess "$DOCROOT/.htaccess"
            restart_app

            rm -f "$BUNDLE"

            echo "==> Helsesjekk"
            sleep 8
            if ! check_url "https://frimedia.no" "frimedia.no"; then
              echo "!! frimedia.no feilet - ruller tilbake"
              find "$APP" -mindepth 1 -maxdepth 1 ! -name tmp ! -name .env.local -exec rm -rf {} +
              tar xzf "$HOME/backups/live-$TS.tar.gz" -C "$APP"
              write_passenger_htaccess "$APP/.htaccess"
              write_passenger_htaccess "$DOCROOT/.htaccess"
              restart_app
              exit 1
            fi

            if ! check_url "https://demo.frimedia.no" "demo.frimedia.no"; then
              echo "!! demo.frimedia.no feilet - ruller tilbake"
              find "$APP" -mindepth 1 -maxdepth 1 ! -name tmp ! -name .env.local -exec rm -rf {} +
              tar xzf "$HOME/backups/live-$TS.tar.gz" -C "$APP"
              write_passenger_htaccess "$APP/.htaccess"
              write_passenger_htaccess "$DOCROOT/.htaccess"
              restart_app
              exit 1
            fi
            echo "==> Deploy OK og verifisert"
